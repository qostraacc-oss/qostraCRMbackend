name: CI/CD Backend

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Run Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django System Check
        run: |
          python manage.py check
        env:
          SECRET_KEY: 'ci-test-key'
          DEBUG: 'True'
          DB_ENGINE: 'django.db.backends.sqlite3' # Use sqlite for CI checks

  deploy:
    name: Deploy to Server
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            # Navigate to the project directory
            cd ${{ secrets.PROJECT_PATH }}
            
            # Pull the latest code
            git pull origin ${{ github.ref_name }}
            
            # Activate the virtual environment (tries common names)
            if [ -d "../venv" ]; then
              source ../venv/bin/activate
            elif [ -d "../env" ]; then
              source ../env/bin/activate
            fi
            
            # Install requirements
            pip install -r requirements.txt
            
            # Run migrations
            python manage.py migrate
            
            # Collect static files
            python manage.py collectstatic --noinput
            
            # --- IMPORTANT ---
            # Restart the application service
            # Example: sudo systemctl restart qostraCRM
            ${{ secrets.RESTART_COMMAND || 'sudo systemctl restart qostraCRM' }}
